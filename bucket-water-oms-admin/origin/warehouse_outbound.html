<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>仓库管理 - 出库管理</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'PingFang SC', sans-serif; }
        .mobile-container { width: 375px; height: 812px; background: #F8FAFC; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border-radius: 40px; border: 8px solid #333; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div class="mobile-container flex flex-col">
<!-- Header -->
<div class="bg-white px-6 pt-12 pb-4 shadow-sm z-10">
<div class="flex items-center gap-4 mb-4">
<a class="text-gray-500" href="warehouse_index.html">
<iconify-icon class="text-2xl" icon="mdi:chevron-left"></iconify-icon>
</a>
<h1 class="text-lg font-bold text-gray-800">出库管理</h1>
</div>
<!-- Sub Tabs -->
<div class="flex gap-6 text-sm">
<a class="pb-2 border-b-2 border-[#1890FF] text-[#1890FF] font-medium" href="#">订单出库</a>
<a class="pb-2 text-gray-400" href="#">调拨出库</a>
<a class="pb-2 text-gray-400" href="#">退货出库</a>
</div>
</div>
<!-- Content -->
<div class="flex-1 overflow-y-auto hide-scrollbar p-4 space-y-4 pb-24">
<!-- Search & Filter -->
<div class="flex gap-2">
<div class="relative flex-1">
<iconify-icon class="absolute left-3 top-3 text-gray-400 text-lg" icon="mdi:magnify"></iconify-icon>
<input class="w-full pl-10 pr-4 py-2.5 bg-white rounded-2xl text-sm border-none shadow-sm focus:ring-1 focus:ring-[#1890FF]" placeholder="搜索订单号/客户名称" type="text"/>
</div>
<button class="w-11 h-11 bg-white rounded-2xl flex items-center justify-center text-gray-500 shadow-sm">
<iconify-icon class="text-xl" icon="mdi:filter-variant"></iconify-icon>
</button>
</div>
<!-- Outbound List -->
<div class="space-y-3">
<!-- Item 1 -->
<div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-50">
<div class="flex justify-between items-start mb-3">
<div>
<span class="text-[10px] text-gray-400">订单号: CK2026041905</span>
<h4 class="font-bold text-gray-800 text-sm mt-0.5">张记旗舰水站</h4>
</div>
<span class="text-[10px] px-2 py-0.5 bg-blue-100 text-[#1890FF] rounded-full">待拣货</span>
</div>
<div class="space-y-2 mb-4">
<div class="flex justify-between text-[10px] text-gray-500">
<span>18.9L 桶装水 (农夫)</span>
<span class="font-bold">x 15</span>
</div>
<div class="flex justify-between text-[10px] text-gray-500">
<span>11.3L 迷你桶 (景田)</span>
<span class="font-bold">x 5</span>
</div>
</div>
<div class="flex justify-between items-center pt-3 border-t border-gray-50">
<span class="text-[10px] text-gray-400">2026-04-19 11:20</span>
<div class="flex gap-2">
<button class="px-3 py-1.5 border border-[#1890FF] text-[#1890FF] text-[10px] rounded-lg font-bold">查看详情</button>
<button class="px-3 py-1.5 bg-[#1890FF] text-white text-[10px] rounded-lg font-bold">开始拣货</button>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-50">
<div class="flex justify-between items-start mb-3">
<div>
<span class="text-[10px] text-gray-400">订单号: CK2026041904</span>
<h4 class="font-bold text-gray-800 text-sm mt-0.5">李家村便利店</h4>
</div>
<span class="text-[10px] px-2 py-0.5 bg-green-100 text-green-600 rounded-full">已出库</span>
</div>
<div class="space-y-2 mb-4">
<div class="flex justify-between text-[10px] text-gray-500">
<span>18.9L 桶装水 (怡宝)</span>
<span class="font-bold">x 30</span>
</div>
</div>
<div class="flex justify-between items-center pt-3 border-t border-gray-50">
<span class="text-[10px] text-gray-400">2026-04-19 09:15</span>
<button class="px-3 py-1.5 border border-gray-200 text-gray-500 text-[10px] rounded-lg font-bold">查看详情</button>
</div>
</div>
</div>
</div>
<!-- Tab Bar -->
<div class="absolute bottom-0 w-full h-20 bg-white border-t border-gray-100 flex items-center justify-around pb-4">
<a class="flex flex-col items-center gap-1 text-gray-400" href="warehouse_index.html">
<iconify-icon class="text-2xl" icon="mdi:home-variant-outline"></iconify-icon>
<span class="text-[10px]">首页</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="warehouse_inbound.html">
<iconify-icon class="text-2xl" icon="mdi:tray-arrow-down"></iconify-icon>
<span class="text-[10px]">入库</span>
</a>
<a class="flex flex-col items-center gap-1 text-[#1890FF]" href="warehouse_outbound.html">
<iconify-icon class="text-2xl" icon="mdi:tray-arrow-up"></iconify-icon>
<span class="text-[10px] font-bold">出库</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="warehouse_inventory.html">
<iconify-icon class="text-2xl" icon="mdi:warehouse"></iconify-icon>
<span class="text-[10px]">库存</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="warehouse_settings.html">
<iconify-icon class="text-2xl" icon="mdi:account-cog-outline"></iconify-icon>
<span class="text-[10px]">我的</span>
</a>
</div>
</div>
</body>
</html>
