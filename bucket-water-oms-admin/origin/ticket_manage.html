<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>水票管理 - 水厂订货管理系统</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'PingFang SC', sans-serif; }
        .mobile-container { width: 375px; height: 812px; background: #F8FAFC; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border-radius: 40px; border: 8px solid #333; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div class="mobile-container flex flex-col">
<!-- Header -->
<div class="bg-white px-6 pt-12 pb-4 shadow-sm z-10">
<div class="flex items-center gap-4">
<a class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-50" href="owner_index.html">
<iconify-icon class="text-xl text-gray-600" icon="mdi:chevron-left"></iconify-icon>
</a>
<h1 class="text-lg font-bold text-gray-800">水票管理</h1>
</div>
</div>
<!-- Scroll Content -->
<div class="flex-1 overflow-y-auto hide-scrollbar p-4 space-y-4 pb-24">
<!-- Ticket Statistics Card -->
<div class="bg-gradient-to-br from-indigo-500 to-blue-500 rounded-3xl p-6 text-white shadow-lg">
<div class="flex justify-between items-start mb-4">
<div>
<p class="text-xs opacity-80 mb-1">未核销总水票 (张)</p>
<p class="text-3xl font-bold">5,842</p>
</div>
<div class="p-2 bg-white/20 rounded-xl">
<iconify-icon class="text-2xl" icon="mdi:ticket-percent-outline"></iconify-icon>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-white/10 rounded-xl p-3">
<p class="text-[10px] opacity-70">本月发行</p>
<p class="text-sm font-bold">1,200</p>
</div>
<div class="bg-white/10 rounded-xl p-3">
<p class="text-[10px] opacity-70">本月核销</p>
<p class="text-sm font-bold">850</p>
</div>
</div>
</div>
<!-- Ticket Types -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<h3 class="font-bold text-gray-800 text-sm">水票种类</h3>
<button class="text-xs text-[#1890FF] font-medium">+ 创建票种</button>
</div>
<!-- Ticket Type 1 -->
<div class="bg-white rounded-3xl p-4 shadow-sm border border-gray-50 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-[#1890FF]">
<iconify-icon class="text-2xl" icon="mdi:water-boiler"></iconify-icon>
</div>
<div>
<h4 class="font-bold text-gray-800 text-sm">经典款 18.9L 电子票</h4>
<p class="text-[10px] text-gray-400">单价: ¥ 8.00 | 套餐: 50送5</p>
</div>
</div>
<div class="text-right">
<p class="text-xs font-bold text-gray-800">2,300 张</p>
<p class="text-[10px] text-gray-400">流通中</p>
</div>
</div>
<!-- Ticket Type 2 -->
<div class="bg-white rounded-3xl p-4 shadow-sm border border-gray-50 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center text-[#52C41A]">
<iconify-icon class="text-2xl" icon="mdi:water-off"></iconify-icon>
</div>
<div>
<h4 class="font-bold text-gray-800 text-sm">特惠 11.3L 电子票</h4>
<p class="text-[10px] text-gray-400">单价: ¥ 6.00 | 套餐: 20送1</p>
</div>
</div>
<div class="text-right">
<p class="text-xs font-bold text-gray-800">1,500 张</p>
<p class="text-[10px] text-gray-400">流通中</p>
</div>
</div>
</div>
<!-- Recent Issuance -->
<div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-50">
<div class="flex justify-between items-center mb-4">
<h3 class="font-bold text-gray-800 text-sm">发票记录</h3>
<span class="text-[10px] text-gray-400">共 15 笔</span>
</div>
<div class="space-y-4">
<div class="flex justify-between items-center">
<div class="flex gap-3">
<div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center">
<img alt="User Avatar" class="w-full h-full rounded-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-04-19/d577af2d6474472ca4c2178cd38776ca.jpg"/>
</div>
<div>
<p class="text-xs font-bold text-gray-800">王大拿 购买了 55 张</p>
<p class="text-[10px] text-gray-400">04-19 10:15 · 经典18.9L</p>
</div>
</div>
<span class="text-sm font-bold text-blue-600">+ ¥ 400.00</span>
</div>
<div class="flex justify-between items-center">
<div class="flex gap-3">
<div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center">
<img alt="User Avatar" class="w-full h-full rounded-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-04-19/d577af2d6474472ca4c2178cd38776ca.jpg"/>
</div>
<div>
<p class="text-xs font-bold text-gray-800">李美丽 购买了 21 张</p>
<p class="text-[10px] text-gray-400">04-18 14:30 · 特惠11.3L</p>
</div>
</div>
<span class="text-sm font-bold text-blue-600">+ ¥ 120.00</span>
</div>
</div>
<button class="w-full mt-4 text-center text-xs text-gray-400 py-2">查看更多记录</button>
</div>
<!-- Action Area -->
<div class="grid grid-cols-2 gap-4">
<button class="bg-white p-4 rounded-3xl border border-gray-50 shadow-sm flex flex-col items-center gap-2">
<div class="w-10 h-10 bg-blue-50 rounded-2xl flex items-center justify-center text-[#1890FF]">
<iconify-icon class="text-xl" icon="mdi:qrcode-scan"></iconify-icon>
</div>
<span class="text-xs font-bold text-gray-700">扫码核销</span>
</button>
<button class="bg-white p-4 rounded-3xl border border-gray-50 shadow-sm flex flex-col items-center gap-2">
<div class="w-10 h-10 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500">
<iconify-icon class="text-xl" icon="mdi:ticket-confirmation-outline"></iconify-icon>
</div>
<span class="text-xs font-bold text-gray-700">线下补票</span>
</button>
</div>
</div>
<!-- Tab Bar -->
<div class="absolute bottom-0 w-full h-20 bg-white border-t border-gray-100 flex items-center justify-around pb-4">
<a class="flex flex-col items-center gap-1 text-[#1890FF]" href="owner_index.html">
<iconify-icon class="text-2xl" icon="mdi:home-variant"></iconify-icon>
<span class="text-[10px] font-bold">首页</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="order_list.html">
<iconify-icon class="text-2xl" icon="mdi:format-list-bulleted"></iconify-icon>
<span class="text-[10px]">订单</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="statement.html">
<iconify-icon class="text-2xl" icon="mdi:finance"></iconify-icon>
<span class="text-[10px]">财务</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="my.html">
<iconify-icon class="text-2xl" icon="mdi:account-outline"></iconify-icon>
<span class="text-[10px]">我的</span>
</a>
</div>
</div>
</body>
</html>
