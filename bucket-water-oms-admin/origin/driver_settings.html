<script>
// Toggle switch functionality
document.getElementById('online-toggle').addEventListener('change', function() {
    if(this.checked) {
        console.log('Switched to online mode');
        updateOnlineStatus('online');
        alert('您已上线，现在可以接收新配送任务');
    } else {
        console.log('Switched to offline mode');
        updateOnlineStatus('offline');
        alert('您已离线，将不会接收新配送任务\n当前配送任务不受影响');
    }
});

function updateOnlineStatus(status) {
    const statusText = document.getElementById('status-text');
    const indicator = document.getElementById('online-indicator');
    
    if (status === 'online') {
        statusText.textContent = '在线';
        indicator.className = 'w-3 h-3 bg-green-400 rounded-full';
    } else if (status === 'offline') {
        statusText.textContent = '离线';
        indicator.className = 'w-3 h-3 bg-gray-400 rounded-full';
    }
}

function updateLocation() {
    console.log('Updating GPS location...');
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                console.log(`Location updated: ${lat}, ${lng}`);
                alert(`位置已更新\n纬度: ${lat.toFixed(6)}\n经度: ${lng.toFixed(6)}\n\n此功能将在实际设备上调用后端API`);
                
                // In production, send to API
                // fetch('/drivers/location', { method: 'POST', body: JSON.stringify({ lat, lng }) })
            },
            function(error) {
                console.error('Location error:', error);
                alert('获取位置失败，请检查定位权限设置');
            }
        );
    } else {
        alert('您的浏览器不支持定位功能');
    }
}

function selectMapApp(app) {
    console.log(`Selected map app: ${app}`);
    alert(`已选择 ${app === 'amap' ? '高德地图' : app === 'baidu' ? '百度地图' : '腾讯地图'} 作为默认导航应用`);
}

function connectBluetoothPrinter() {
    console.log('Connecting to Bluetooth printer...');
    alert('正在搜索蓝牙打印机...\n\n提示：请确保打印机已开启并处于配对模式\n支持的打印机：佳博、智崎等58mm/80mm蓝牙打印机');
}

function showSecuritySettings() {
    alert('账号安全设置\n\n• 修改登录密码\n• 绑定手机号: 138****8888\n• 绑定微信号: 已绑定\n• 设备管理\n\n这些功能将在正式版本中开放');
}

function showAbout() {
    alert('水厂订货管理系统 · 司机端\n\n版本: v2.1.0\n构建时间: 2026-04-21\n\n© 2026 水厂订货管理系统\n技术支持: 400-xxx-xxxx');
}

function confirmLogout() {
    if (confirm('确定要退出登录吗？\n\n退出后将无法接收新的配送任务。')) {
        console.log('Logging out...');
        window.location.href = 'login.html';
    }
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    console.log('Driver settings page loaded');
    // Start location tracking if online
    const toggle = document.getElementById('online-toggle');
    if (toggle.checked) {
        updateLocation();
    }
});
</script>
