<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>仓库管理 - 空桶核对</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'PingFang SC', sans-serif; }
        .mobile-container { width: 375px; height: 812px; background: #F8FAFC; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border-radius: 40px; border: 8px solid #333; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div class="mobile-container flex flex-col">
<!-- Header -->
<div class="bg-white px-6 pt-12 pb-4 shadow-sm z-10 flex items-center gap-4">
<a class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full" href="warehouse_return_list.html">
<iconify-icon class="text-2xl text-gray-800" icon="mdi:chevron-left"></iconify-icon>
</a>
<h1 class="text-lg font-bold text-gray-800 flex-1">空桶核对</h1>
<div class="flex items-center gap-2">
<span class="text-[10px] px-2 py-1 bg-blue-100 text-[#1890FF] font-bold rounded-lg">待核对</span>
</div>
</div>
<div class="flex-1 overflow-y-auto hide-scrollbar p-4 space-y-4 pb-32">
<!-- Driver Info -->
<div class="bg-white rounded-3xl p-5 shadow-sm">
<div class="flex items-center gap-3 mb-4">
<div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center">
<iconify-icon class="text-2xl text-[#1890FF]" icon="mdi:account"></iconify-icon>
</div>
<div class="flex-1">
<p class="text-sm font-bold text-gray-800">张小龙</p>
<p class="text-[10px] text-gray-400 mt-1">工号: DRV-2024-001 | 回仓单号: #RT2026042101</p>
</div>
<button class="w-10 h-10 bg-green-50 text-green-500 rounded-full flex items-center justify-center">
<iconify-icon class="text-xl" icon="mdi:phone"></iconify-icon>
</button>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="p-3 bg-gray-50 rounded-xl text-center">
<p class="text-[10px] text-gray-400 mb-1">配送订单</p>
<p class="text-sm font-bold text-gray-800">#850018</p>
</div>
<div class="p-3 bg-gray-50 rounded-xl text-center">
<p class="text-[10px] text-gray-400 mb-1">送达时间</p>
<p class="text-sm font-bold text-gray-800">14:25</p>
</div>
</div>
</div>
<!-- Bucket Check Form -->
<div class="bg-white rounded-3xl p-5 shadow-sm">
<h3 class="font-bold text-gray-800 text-sm mb-4">空桶清点</h3>
<div class="space-y-4">
<div class="p-4 bg-blue-50 rounded-2xl">
<div class="flex justify-between items-center mb-3">
<span class="text-xs text-gray-700">司机上报回收空桶</span>
<span class="text-lg font-bold text-[#1890FF]">68 个</span>
</div>
<div class="text-[10px] text-gray-500">包含订单配送时的空桶回收</div>
</div>
<div class="p-4 bg-orange-50 rounded-2xl">
<div class="flex justify-between items-center mb-3">
<span class="text-xs text-gray-700">其中欠桶</span>
<span class="text-lg font-bold text-orange-500">2 个</span>
</div>
<div class="text-[10px] text-gray-500">客户无法退回的空桶</div>
</div>
<div class="border-2 border-dashed border-gray-200 rounded-2xl p-5">
<div class="flex justify-between items-center mb-3">
<span class="text-sm font-bold text-gray-800">仓库实收空桶 <span class="text-[#FF4D4F]">*</span></span>
</div>
<input class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-center text-2xl font-bold text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#1890FF]" placeholder="0" type="number"/>
<div class="text-[10px] text-gray-400 mt-2 text-center">请输入仓库实际清点的空桶数量</div>
</div>
</div>
</div>
<!-- Difference Analysis -->
<div class="bg-white rounded-3xl p-5 shadow-sm">
<h3 class="font-bold text-gray-800 text-sm mb-4">差异分析</h3>
<div class="space-y-3">
<div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl">
<span class="text-xs text-gray-600">司机上报</span>
<span class="text-sm font-bold text-gray-800">68 个</span>
</div>
<div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl">
<span class="text-xs text-gray-600">仓库实收</span>
<span class="text-sm font-bold text-gray-800">0 个</span>
</div>
<div class="flex justify-between items-center p-3 bg-red-50 rounded-xl">
<span class="text-xs text-gray-600">差异数量</span>
<span class="text-sm font-bold text-red-500">0 个</span>
</div>
</div>
<div class="mt-4 p-3 bg-orange-50 rounded-xl">
<div class="flex items-center gap-2">
<iconify-icon class="text-orange-500" icon="mdi:information-outline"></iconify-icon>
<span class="text-xs text-orange-700">差异 = 司机上报 - 仓库实收。正数由司机承担赔偿，负数需司机说明原因。</span>
</div>
</div>
</div>
<!-- Replenishment Info -->
<div class="bg-white rounded-3xl p-5 shadow-sm">
<h3 class="font-bold text-gray-800 text-sm mb-4">补货信息</h3>
<div class="space-y-3">
<div class="flex justify-between items-center p-3 bg-purple-50 rounded-xl">
<div class="flex items-center gap-2">
<iconify-icon class="text-purple-500" icon="mdi:truck-outline"></iconify-icon>
<span class="text-xs text-gray-700">申请补货</span>
</div>
<span class="text-sm font-bold text-purple-500">18.9L×20 桶</span>
</div>
</div>
<div class="mt-4 p-3 bg-gray-50 rounded-xl">
<div class="flex justify-between items-center">
<span class="text-xs text-gray-500">补货仓库库存</span>
<span class="text-xs font-bold text-green-500">充足 (150桶)</span>
</div>
</div>
</div>
<!-- Actions -->
<div class="bg-white rounded-3xl p-5 shadow-sm">
<h3 class="font-bold text-gray-800 text-sm mb-4">核对操作</h3>
<div class="space-y-3">
<button class="w-full py-3 bg-[#52C41A] text-white rounded-xl text-sm font-bold shadow-md shadow-green-100 active:scale-95 transition-transform" onclick="confirm('确认空桶数量一致，入库成功？')">
<iconify-icon class="mr-2" icon="mdi:check"></iconify-icon>确认入库
</button>
<button class="w-full py-3 bg-white border border-[#FF4D4F] text-[#FF4D4F] rounded-xl text-sm font-bold active:scale-95 transition-transform" onclick="confirm('确认存在差异，将生成赔偿记录？')">
<iconify-icon class="mr-2" icon="mdi:alert-circle"></iconify-icon>记录差异
</button>
<button class="w-full py-3 bg-gray-50 text-gray-600 rounded-xl text-sm font-bold active:scale-95 transition-transform" onclick="alert('正在打印回仓单...')">
<iconify-icon class="mr-2" icon="mdi:printer"></iconify-icon>打印回仓单
</button>
</div>
</div>
</div>
</div>
</body>
</html>
