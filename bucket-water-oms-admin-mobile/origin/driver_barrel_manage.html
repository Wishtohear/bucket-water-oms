<!DOCTYPE html>

<style>

<body>

<a class="flex flex-col items-center gap-1 text-[#1890FF]" href="driver_barrel_manage.html">

<a class="flex flex-col items-center gap-1 text-gray-400" href="statement_driver.html">

</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="driver_settings.html">
