server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bucket_water_oms}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 50

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1

cors:
  enabled: ${CORS_ENABLED:false}
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

jwt:
  secret: ${JWT_SECRET:change-this-in-production}
  expiration: ${JWT_EXPIRATION:86400000}
  header: Authorization
  prefix: Bearer

logging:
  level:
    root: INFO
    com.bucketwater.oms: INFO
  file:
    name: /var/log/bucket-water-oms/bucket-water-oms.log
