spring:
  application:
    name: bucket-water-oms

  profiles:
    active: dev

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://192.168.31.251:5432/wateroms
    username: wateroms
    password: afABhkhWH3DewsGs
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

  data:
    redis:
      host: 192.168.31.251
      port: 6379
      database: 1
      password: qwer1234
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

cors:
  enabled: true
  allowed-origins: "*"

jwt:
  secret: defaultSecretKeyForDevelopment123456789012345678901234567890
  access-token-validity: 7200
  refresh-token-validity: 604800
  header: Authorization
  prefix: Bearer

wechat:
  enabled: false
  appid: wx1234567890abcdef234567890abcdef
  mchid: 1234567890abcdef1234567890abcdef1234567890abcdef
  apikey: 1234567890abcdef1234567890abcdef1234567890abcdef
  notify-url: https://api.example.com/payment/wechat-notify

sms:
  enabled: false
  provider: aliyun
  aliyun:
    access-key: your-access-key
    secret-key: your-secret-key
    sign-name: 您的签名
    template-code: SMS_123456789
    region-id: cn-hangzhou

map:
  enabled: false
  provider: amap
  mock-enabled: true
  amap:
    key: your-amap-key
  baidu:
    key: your-baidu-key

file:
  upload-dir: ./uploads
  max-size: 10485760
  access-url-prefix: /files
  allowed-types:
    - photos
    - signatures
    - documents
    - certs
    - other
  allowed-extensions:
    - jpg
    - jpeg
    - png
    - gif
    - bmp
    - webp
    - pdf
    - doc
    - docx
    - xls
    - xlsx
    - ppt
    - pptx
    - txt

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.bucketwater.oms.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.bucketwater.oms: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/bucket-water-oms.log
